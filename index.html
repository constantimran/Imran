<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  /* ── RESET ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-1: #0a0a0f;
    --bg-2: #111118;
    --glass: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.09);
    --glass-hover: rgba(255,255,255,0.08);
    --neon: #00e5ff;
    --neon2: #00b4d8;
    --neon-glow: rgba(0,229,255,0.18);
    --orange: #ff6b35;
    --orange-glow: rgba(255,107,53,0.22);
    --green: #06ffa5;
    --red: #ff4d6d;
    --text: #f0f4ff;
    --text-muted: rgba(240,244,255,0.45);
    --display-bg: rgba(0,0,0,0.35);
    --sans: 'Outfit', sans-serif;
    --mono: 'JetBrains Mono', monospace;
    --radius: 20px;
    --radius-sm: 14px;
    --btn-radius: 16px;
  }

  html, body {
    height: 100%;
    font-family: var(--sans);
    background: var(--bg-1);
    color: var(--text);
    overflow: hidden;
  }

  /* ── ANIMATED BACKGROUND ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(0,229,255,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 80%, rgba(255,107,53,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 60% 10%, rgba(6,255,165,0.04) 0%, transparent 50%);
    pointer-events: none;
  }

  /* ── LAYOUT ── */
  .page {
    position: relative; z-index: 1;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .calc-wrapper {
    display: flex;
    gap: 1rem;
    align-items: flex-start;
    animation: rise 0.6s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(30px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── CALCULATOR CARD ── */
  .calculator {
    width: 340px;
    background: rgba(16,16,26,0.8);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow:
      0 32px 80px rgba(0,0,0,0.6),
      0 0 0 1px rgba(255,255,255,0.04) inset,
      0 1px 0 rgba(255,255,255,0.08) inset;
    overflow: hidden;
    padding-bottom: 1.25rem;
  }

  /* ── TOP BAR ── */
  .top-bar {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 1rem 1.25rem 0.75rem;
  }
  .dot {
    width: 11px; height: 11px; border-radius: 50%;
    transition: opacity 0.2s;
  }
  .dot-r { background: #ff5f57; }
  .dot-y { background: #febc2e; }
  .dot-g { background: #28c840; }
  .calc-title {
    margin-left: auto;
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 500;
  }

  /* ── DISPLAY ── */
  .display {
    margin: 0 1.1rem 1rem;
    background: var(--display-bg);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 1.1rem 1.25rem 1rem;
    min-height: 92px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: flex-end;
    gap: 0.3rem;
    position: relative;
    overflow: hidden;
  }
  .display::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--neon), transparent);
    opacity: 0.35;
  }

  .expression {
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--text-muted);
    min-height: 1.1rem;
    word-break: break-all;
    text-align: right;
    transition: opacity 0.2s;
    max-width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .result {
    font-family: var(--mono);
    font-size: 2.4rem;
    font-weight: 500;
    color: var(--text);
    line-height: 1;
    word-break: break-all;
    text-align: right;
    max-width: 100%;
    transition: color 0.2s, transform 0.15s;
    letter-spacing: -0.02em;
  }
  .result.flash {
    color: var(--neon);
    transform: scale(1.03);
  }
  .result.error { color: var(--red); }

  /* ── BUTTONS GRID ── */
  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.55rem;
    padding: 0 1.1rem;
  }

  /* ── BUTTON BASE ── */
  .btn {
    border: none; outline: none; cursor: pointer;
    font-family: var(--sans);
    font-size: 1.1rem;
    font-weight: 500;
    height: 60px;
    border-radius: var(--btn-radius);
    display: flex; align-items: center; justify-content: center;
    transition:
      transform 0.1s cubic-bezier(0.34,1.56,0.64,1),
      box-shadow 0.15s,
      background 0.15s,
      color 0.15s;
    position: relative;
    overflow: hidden;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .btn::after {
    content: '';
    position: absolute; inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.12s;
    border-radius: inherit;
  }
  .btn:active::after { background: rgba(255,255,255,0.08); }
  .btn:active { transform: scale(0.93); }

  /* ── BUTTON TYPES ── */
  .btn-num {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3), 0 1px 0 rgba(255,255,255,0.06) inset;
  }
  .btn-num:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.14);
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(0,0,0,0.35), 0 1px 0 rgba(255,255,255,0.08) inset;
  }

  .btn-op {
    background: rgba(0,229,255,0.1);
    border: 1px solid rgba(0,229,255,0.25);
    color: var(--neon);
    font-weight: 600;
    box-shadow: 0 2px 10px rgba(0,229,255,0.08), 0 1px 0 rgba(0,229,255,0.12) inset;
  }
  .btn-op:hover {
    background: rgba(0,229,255,0.18);
    border-color: rgba(0,229,255,0.4);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(0,229,255,0.2);
  }

  .btn-fn {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.07);
    color: var(--text-muted);
    font-size: 0.9rem;
    font-weight: 500;
  }
  .btn-fn:hover {
    background: rgba(255,255,255,0.09);
    color: var(--text);
    transform: translateY(-1px);
  }

  .btn-eq {
    background: linear-gradient(135deg, var(--orange), #e8522a);
    border: 1px solid rgba(255,107,53,0.4);
    color: #fff;
    font-size: 1.3rem;
    font-weight: 700;
    box-shadow: 0 4px 20px var(--orange-glow), 0 1px 0 rgba(255,255,255,0.15) inset;
    grid-column: span 2;
  }
  .btn-eq:hover {
    background: linear-gradient(135deg, #ff7a4a, #e8522a);
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(255,107,53,0.4);
  }

  .btn-clear {
    background: rgba(255,77,109,0.12);
    border: 1px solid rgba(255,77,109,0.25);
    color: var(--red);
    font-size: 0.88rem;
    font-weight: 600;
    letter-spacing: 0.03em;
  }
  .btn-clear:hover {
    background: rgba(255,77,109,0.22);
    border-color: rgba(255,77,109,0.4);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(255,77,109,0.2);
  }

  .btn-del {
    background: rgba(255,77,109,0.08);
    border: 1px solid rgba(255,77,109,0.18);
    color: rgba(255,77,109,0.8);
    font-size: 1rem;
  }
  .btn-del:hover {
    background: rgba(255,77,109,0.15);
    color: var(--red);
    transform: translateY(-1px);
  }

  .btn-pct {
    background: rgba(6,255,165,0.07);
    border: 1px solid rgba(6,255,165,0.2);
    color: var(--green);
    font-weight: 600;
  }
  .btn-pct:hover {
    background: rgba(6,255,165,0.14);
    border-color: rgba(6,255,165,0.35);
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(6,255,165,0.15);
  }

  .btn-dot {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--neon);
    font-size: 1.5rem;
    font-weight: 700;
  }
  .btn-dot:hover {
    background: rgba(255,255,255,0.1);
    transform: translateY(-1px);
  }

  /* ── HISTORY PANEL ── */
  .history-panel {
    width: 200px;
    background: rgba(16,16,26,0.7);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 16px 48px rgba(0,0,0,0.4);
    padding: 1rem;
    max-height: 420px;
    display: flex;
    flex-direction: column;
    animation: rise 0.7s 0.1s cubic-bezier(0.22,1,0.36,1) both;
  }

  .history-title {
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 600;
    margin-bottom: 0.75rem;
    padding-bottom: 0.6rem;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .history-clear-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); font-size: 0.7rem;
    font-family: var(--sans); padding: 0.1rem 0.4rem;
    border-radius: 4px; transition: color 0.2s, background 0.2s;
  }
  .history-clear-btn:hover { color: var(--red); background: rgba(255,77,109,0.1); }

  .history-list {
    overflow-y: auto; flex: 1;
    display: flex; flex-direction: column; gap: 0.5rem;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
  }
  .history-list::-webkit-scrollbar { width: 3px; }
  .history-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

  .history-item {
    padding: 0.5rem 0.65rem;
    background: var(--glass);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    text-align: right;
    animation: fadeIn 0.25s ease both;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(10px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .history-item:hover { background: rgba(0,229,255,0.07); border-color: rgba(0,229,255,0.2); }
  .history-expr {
    font-family: var(--mono);
    font-size: 0.68rem; color: var(--text-muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 0.15rem;
  }
  .history-val {
    font-family: var(--mono);
    font-size: 0.9rem; color: var(--neon); font-weight: 500;
  }

  .history-empty {
    font-size: 0.8rem; color: var(--text-muted);
    text-align: center; margin-top: 1.5rem;
    line-height: 1.6;
  }

  /* ── KEYBOARD HINT ── */
  .kbd-hint {
    text-align: center;
    font-size: 0.68rem;
    color: rgba(255,255,255,0.2);
    margin-top: 1rem;
    letter-spacing: 0.06em;
  }

  /* ── RIPPLE ANIMATION ── */
  @keyframes ripple {
    0%   { transform: scale(0); opacity: 0.5; }
    100% { transform: scale(4); opacity: 0; }
  }
  .ripple-effect {
    position: absolute;
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    transform: scale(0);
    animation: ripple 0.5s linear;
    pointer-events: none;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .calc-wrapper { flex-direction: column; align-items: center; }
    .history-panel { width: 100%; max-width: 340px; max-height: 180px; }
    body { overflow: auto; }
    html, body { height: auto; }
    .page { height: auto; padding: 1.5rem 1rem 2rem; }
  }
</style>
</head>
<body>

<div class="page">
  <div class="calc-wrapper">

    <!-- ══ CALCULATOR ══ -->
    <div class="calculator">
      <!-- Top bar -->
      <div class="top-bar">
        <div class="dot dot-r"></div>
        <div class="dot dot-y"></div>
        <div class="dot dot-g"></div>
        <span class="calc-title">Calculator</span>
      </div>

      <!-- Display -->
      <div class="display">
        <div class="expression" id="expression"></div>
        <div class="result" id="result">0</div>
      </div>

      <!-- Buttons -->
      <div class="buttons">
        <!-- Row 1 -->
        <button class="btn btn-clear" data-action="clear">AC</button>
        <button class="btn btn-del"   data-action="del">⌫</button>
        <button class="btn btn-pct"   data-action="pct">%</button>
        <button class="btn btn-op"    data-action="op" data-value="÷">÷</button>

        <!-- Row 2 -->
        <button class="btn btn-num" data-action="num" data-value="7">7</button>
        <button class="btn btn-num" data-action="num" data-value="8">8</button>
        <button class="btn btn-num" data-action="num" data-value="9">9</button>
        <button class="btn btn-op"  data-action="op"  data-value="×">×</button>

        <!-- Row 3 -->
        <button class="btn btn-num" data-action="num" data-value="4">4</button>
        <button class="btn btn-num" data-action="num" data-value="5">5</button>
        <button class="btn btn-num" data-action="num" data-value="6">6</button>
        <button class="btn btn-op"  data-action="op"  data-value="−">−</button>

        <!-- Row 4 -->
        <button class="btn btn-num" data-action="num" data-value="1">1</button>
        <button class="btn btn-num" data-action="num" data-value="2">2</button>
        <button class="btn btn-num" data-action="num" data-value="3">3</button>
        <button class="btn btn-op"  data-action="op"  data-value="+">+</button>

        <!-- Row 5 -->
        <button class="btn btn-fn"  data-action="sign">+/−</button>
        <button class="btn btn-num" data-action="num"  data-value="0">0</button>
        <button class="btn btn-dot" data-action="dot">·</button>
        <button class="btn btn-eq"  data-action="eq" style="grid-column:span 1">=</button>
      </div>
    </div>

    <!-- ══ HISTORY PANEL ══ -->
    <div class="history-panel">
      <div class="history-title">
        History
        <button class="history-clear-btn" id="clearHistory">Clear</button>
      </div>
      <div class="history-list" id="historyList">
        <p class="history-empty">No calculations yet.<br>Results appear here.</p>
      </div>
      <p class="kbd-hint">⌨️ Keyboard supported</p>
    </div>

  </div>
</div>

<script>
/* ══ STATE ══════════════════════════════════════════════ */
let current    = '0';
let expression = '';
let operand    = null;
let operator   = null;
let justEvaled = false;
let history    = [];

/* ══ DOM ════════════════════════════════════════════════ */
const $result  = document.getElementById('result');
const $expr    = document.getElementById('expression');
const $hist    = document.getElementById('historyList');

/* ══ DISPLAY ════════════════════════════════════════════ */
function updateDisplay() {
  // Fit long numbers
  const len = current.length;
  $result.style.fontSize =
    len > 14 ? '1rem' :
    len > 11 ? '1.4rem' :
    len > 9  ? '1.8rem' :
    len > 7  ? '2rem'   : '2.4rem';

  $result.textContent = current;
  $expr.textContent   = expression;
}

function flashResult(ok = true) {
  $result.classList.add(ok ? 'flash' : 'error');
  setTimeout(() => $result.classList.remove('flash', 'error'), 200);
}

/* ══ CORE LOGIC ═════════════════════════════════════════ */
function inputNum(val) {
  if (justEvaled) {
    current    = val;
    expression = '';
    operand    = null;
    operator   = null;
    justEvaled = false;
  } else {
    if (current === '0' && val !== '.') {
      current = val;
    } else if (current.length < 15) {
      current += val;
    }
  }
  updateDisplay();
}

function inputDot() {
  if (justEvaled) {
    current    = '0.';
    expression = '';
    operand    = null;
    operator   = null;
    justEvaled = false;
  } else if (!current.includes('.')) {
    current += '.';
  }
  updateDisplay();
}

function inputOp(op) {
  justEvaled = false;

  if (operator && operand !== null) {
    // Chain calculation
    const result = calc(operand, parseFloat(current), operator);
    if (result === null) { handleError(); return; }
    current  = fmt(result);
    operand  = result;
    flashResult();
  } else {
    operand = parseFloat(current);
  }

  operator   = op;
  expression = `${fmt(operand)} ${op}`;
  current    = '0';
  updateDisplay();
}

function evaluate() {
  if (operator === null || operand === null) return;

  const b       = parseFloat(current);
  const fullExpr = `${fmt(operand)} ${operator} ${fmt(b)}`;
  const result   = calc(operand, b, operator);

  if (result === null) { handleError(); return; }

  const answer = fmt(result);
  addHistory(fullExpr, answer);
  flashResult();

  expression = `${fullExpr} =`;
  current    = answer;
  operand    = null;
  operator   = null;
  justEvaled = true;
  updateDisplay();
}

function calc(a, b, op) {
  switch (op) {
    case '+': return a + b;
    case '−': return a - b;
    case '×': return a * b;
    case '÷': return b === 0 ? null : a / b;
    default:  return null;
  }
}

function handleError() {
  current    = 'Error';
  expression = '';
  operand    = null;
  operator   = null;
  justEvaled = true;
  $result.classList.add('error');
  setTimeout(() => {
    $result.classList.remove('error');
    clearAll();
  }, 900);
  updateDisplay();
}

function clearAll() {
  current    = '0';
  expression = '';
  operand    = null;
  operator   = null;
  justEvaled = false;
  updateDisplay();
}

function delChar() {
  if (justEvaled) { clearAll(); return; }
  if (current.length === 1 || (current.length === 2 && current.startsWith('-'))) {
    current = '0';
  } else {
    current = current.slice(0, -1);
  }
  updateDisplay();
}

function pct() {
  const n = parseFloat(current);
  if (isNaN(n)) return;
  current = fmt(n / 100);
  flashResult();
  updateDisplay();
}

function toggleSign() {
  const n = parseFloat(current);
  if (isNaN(n) || n === 0) return;
  current = fmt(-n);
  updateDisplay();
}

function fmt(n) {
  if (!isFinite(n)) return 'Error';
  // Avoid floating point junk
  const s = parseFloat(n.toPrecision(12));
  return String(s);
}

/* ══ HISTORY ════════════════════════════════════════════ */
function addHistory(expr, val) {
  history.unshift({ expr, val });
  if (history.length > 30) history.pop();
  renderHistory();
}

function renderHistory() {
  if (history.length === 0) {
    $hist.innerHTML = '<p class="history-empty">No calculations yet.<br>Results appear here.</p>';
    return;
  }
  $hist.innerHTML = history.map((h, i) => `
    <div class="history-item" data-index="${i}">
      <div class="history-expr">${h.expr}</div>
      <div class="history-val">${h.val}</div>
    </div>
  `).join('');
  // Click to recall
  $hist.querySelectorAll('.history-item').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.index);
      current    = history[idx].val;
      expression = '';
      operand    = null;
      operator   = null;
      justEvaled = true;
      updateDisplay();
      flashResult();
    });
  });
}

document.getElementById('clearHistory').addEventListener('click', () => {
  history = [];
  renderHistory();
});

/* ══ BUTTON EVENTS ══════════════════════════════════════ */
document.querySelectorAll('.btn').forEach(btn => {
  btn.addEventListener('click', e => {
    addRipple(btn, e);
    const action = btn.dataset.action;
    const value  = btn.dataset.value;
    handleAction(action, value);
  });
});

function handleAction(action, value) {
  switch (action) {
    case 'num':   inputNum(value); break;
    case 'dot':   inputDot();      break;
    case 'op':    inputOp(value);  break;
    case 'eq':    evaluate();      break;
    case 'clear': clearAll();      break;
    case 'del':   delChar();       break;
    case 'pct':   pct();           break;
    case 'sign':  toggleSign();    break;
  }
}

/* ══ RIPPLE EFFECT ══════════════════════════════════════ */
function addRipple(btn, e) {
  const r   = document.createElement('span');
  r.classList.add('ripple-effect');
  const rect = btn.getBoundingClientRect();
  r.style.left = (e.clientX - rect.left - 20) + 'px';
  r.style.top  = (e.clientY - rect.top  - 20) + 'px';
  btn.appendChild(r);
  r.addEventListener('animationend', () => r.remove());
}

/* ══ KEYBOARD ═══════════════════════════════════════════ */
const keyMap = {
  '0':'num','1':'num','2':'num','3':'num','4':'num',
  '5':'num','6':'num','7':'num','8':'num','9':'num',
  '.':'dot',',':'dot',
  '+': ['+','op'], '-': ['−','op'],
  '*': ['×','op'], '/': ['÷','op'],
  'Enter':'eq', '=':'eq',
  'Backspace':'del', 'Escape':'clear', '%':'pct',
};

document.addEventListener('keydown', e => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  const k = e.key;

  // Highlight matching button
  let btn = null;

  if ('0123456789'.includes(k)) {
    handleAction('num', k);
    btn = document.querySelector(`.btn-num[data-value="${k}"]`);
  } else if (k === '.' || k === ',') {
    handleAction('dot');
    btn = document.querySelector('.btn-dot');
  } else if (k === '+') {
    handleAction('op', '+');
    btn = document.querySelector('.btn-op[data-value="+"]');
  } else if (k === '-') {
    handleAction('op', '−');
    btn = document.querySelector('.btn-op[data-value="−"]');
  } else if (k === '*') {
    handleAction('op', '×');
    btn = document.querySelector('.btn-op[data-value="×"]');
  } else if (k === '/') {
    e.preventDefault();
    handleAction('op', '÷');
    btn = document.querySelector('.btn-op[data-value="÷"]');
  } else if (k === 'Enter' || k === '=') {
    handleAction('eq');
    btn = document.querySelector('.btn-eq');
  } else if (k === 'Backspace') {
    handleAction('del');
    btn = document.querySelector('.btn-del');
  } else if (k === 'Escape') {
    handleAction('clear');
    btn = document.querySelector('.btn-clear');
  } else if (k === '%') {
    handleAction('pct');
    btn = document.querySelector('.btn-pct');
  }

  if (btn) {
    btn.classList.add('active-key');
    setTimeout(() => btn.classList.remove('active-key'), 120);
  }
});

/* ══ INIT ═══════════════════════════════════════════════ */
updateDisplay();
</script>

<style>
  .btn.active-key {
    transform: scale(0.92) !important;
    filter: brightness(1.3);
  }
</style>
